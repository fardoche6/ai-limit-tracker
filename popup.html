<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Limit Tracker</title>
  <style>
    :root {
      --bg: #121212;
      --card: #1f1f1f;
      --text: #ffffff;
      --text-muted: #a0a0a0;
      --brand: #4caf50;
      --danger: #e53935;
      --warning: #fb8c00;
    }
    body {
      width: 300px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    h2 { margin: 0 0 16px; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 8px; }
    .card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; }
    .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--brand); transition: width 0.3s; }
    .progress-fill.warning { background: var(--warning); }
    .progress-fill.danger { background: var(--danger); }
    .stats { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
    .reset-info { font-size: 10px; color: var(--brand); margin-top: 4px; }
    #footer { font-size: 10px; text-align: center; color: var(--text-muted); margin-top: 16px; }
  </style>
</head>
<body>

  <h2>AI Subscription Limits</h2>

  <div id="dashboard">
    <!-- Populated by JS -->
  </div>

  <div id="footer">
    Limits tracking in background based on your activity.
  </div>

  <script src="popup.js"></script>
</body>
</html>
